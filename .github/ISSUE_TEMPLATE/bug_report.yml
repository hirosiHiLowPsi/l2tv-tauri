name: Bug report
description: Report a reproducible L2TV Tauri problem without attaching private databases.
title: "[Bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not attach score.db, song.db, Rival DB, transfer JSON, or private identifiers.
  - type: input
    id: version
    attributes:
      label: L2TV version
      placeholder: 3.0.0
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: Windows 11 24H2 x64
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed database files, transfer JSON, IDs, names, and other personal data.
          required: true
