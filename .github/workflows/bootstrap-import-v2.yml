name: Bootstrap validated source v2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/bootstrap-import-v2.yml

permissions:
  contents: write

jobs:
  import-source:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Import non-workflow source
        shell: pwsh
        run: |
          Expand-Archive -LiteralPath l2tv-tauri-source-bootstrap.zip -DestinationPath . -Force

          $generatedWorkflows = @(
            '.github/workflows/ci.yml',
            '.github/workflows/codeql.yml',
            '.github/workflows/dependency-review.yml',
            '.github/workflows/release.yml',
            '.github/workflows/security-audit.yml'
          )
          foreach ($workflow in $generatedWorkflows) {
            if (Test-Path -LiteralPath $workflow) {
              Remove-Item -LiteralPath $workflow -Force
            }
          }

          Remove-Item -LiteralPath l2tv-tauri-source-bootstrap.zip -Force

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No source changes were found."
            exit 0
          }

          git commit -m "Import validated Tauri 2 source"
          git push origin HEAD:main
