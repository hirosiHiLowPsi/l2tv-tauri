name: Security audit

on:
  push:
    branches: [main, master]
    paths:
      - package.json
      - package-lock.json
      - src-tauri/Cargo.toml
      - src-tauri/Cargo.lock
      - .github/workflows/security-audit.yml
  pull_request:
    branches: [main, master]
    paths:
      - package.json
      - package-lock.json
      - src-tauri/Cargo.toml
      - src-tauri/Cargo.lock
      - .github/workflows/security-audit.yml
  schedule:
    - cron: "0 18 * * 6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Audit npm dependencies
        run: npm audit --audit-level=high

  rustsec:
    name: RustSec audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup toolchain install 1.97.0 --profile minimal
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Verify ignored advisories are outside the Windows build
        shell: bash
        run: |
          if cargo tree \
            --manifest-path src-tauri/Cargo.toml \
            --target x86_64-pc-windows-msvc \
            -i quick-xml@0.39.4 2>/dev/null | grep -q "quick-xml v0.39.4"; then
            echo "quick-xml 0.39.4 unexpectedly entered the Windows dependency tree."
            exit 1
          fi
      - name: Audit Cargo.lock
        # These advisories affect quick-xml 0.39.4 pulled only by the Linux
        # Wayland file-dialog stack. L2TV Tauri is distributed for Windows,
        # and the preceding step fails if that crate enters the Windows build.
        run: >-
          cargo audit --file src-tauri/Cargo.lock
          --ignore RUSTSEC-2026-0194
          --ignore RUSTSEC-2026-0195
